name: Desktop Preview

on:
  push:
    branches:
      - main
      - edge
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Preview (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-22.04
          - platform: macos
            runner: macos-14
          - platform: windows
            runner: windows-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri desktop app
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Linux preview
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: selene-wallet-linux-preview
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 7

      - name: Upload macOS preview
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: selene-wallet-macos-preview
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Windows preview
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: selene-wallet-windows-preview
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 7
