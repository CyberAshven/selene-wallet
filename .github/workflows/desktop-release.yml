name: Desktop Release

on:
  push:
    tags:
      - '20[2-9][0-9].*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-22.04
          - platform: macos
            runner: macos-14
          - platform: windows
            runner: windows-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri desktop app
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Linux installers
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: selene-wallet-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload macOS installer
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: selene-wallet-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload Windows installer
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: selene-wallet-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'Selene Wallet Desktop ${{ github.ref_name }}'
          files: artifacts/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
          body: |
            ## Selene Wallet Desktop ${{ github.ref_name }}

            Cross-platform desktop builds powered by [Tauri v2](https://tauri.app).

            | Platform | Download |
            |----------|----------|
            | Windows | `.exe` (NSIS installer) |
            | macOS | `.dmg` |
            | Linux | `.deb` (Ubuntu 22.10+ / Debian 12+) · `.AppImage` |

            > **Linux note:** Requires `libwebkit2gtk-4.1-0`. Ubuntu 22.10+, Debian 12+, Fedora 37+ supported.
            > **macOS / Windows:** Builds are currently unsigned.
            > macOS: right-click → Open to bypass Gatekeeper on first launch.
            > Windows: click "More info" → "Run anyway" in the SmartScreen dialog.
